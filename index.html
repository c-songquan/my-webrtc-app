<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P 终极控制台 v2.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --main: #00d2ff; --warn: #ff4b2b; --bg: #0f0f12; --panel: #1a1a20; --text: #e0e0e0; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* 左侧侧边栏：大厅与状态 */
        .sidebar { width: 320px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-brand { padding: 30px 20px; background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: white; }
        .sidebar-brand h2 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
        
        .lobby-section { flex: 1; overflow-y: auto; padding: 20px; }
        .id-card { background: #252530; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--main); }
        .peer-item { background: #2a2a35; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid transparent; }
        .peer-item:hover { background: #323240; border-color: var(--main); transform: translateX(5px); }
        .peer-item.me { opacity: 0.5; cursor: default; transform: none; border-color: #444; }
        .online-tag { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }

        /* 中间视频区 */
        .stage { flex: 1; display: flex; flex-direction: column; position: relative; background: #050505; }
        .video-wrapper { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        #remote-video { width: 100%; height: 100%; object-fit: contain; }
        .pip-window { position: absolute; bottom: 20px; right: 20px; width: 200px; aspect-ratio: 16/9; border: 2px solid var(--main); border-radius: 12px; overflow: hidden; transform: scaleX(-1); background: #000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #local-video { width: 100%; height: 100%; object-fit: cover; }

        /* 状态指示与控制 */
        .info-bar { height: 40px; background: #111; display: flex; align-items: center; padding: 0 20px; font-size: 12px; color: #888; justify-content: space-between; border-top: 1px solid #222; }
        .controls { height: 100px; background: var(--panel); display: flex; align-items: center; justify-content: center; gap: 25px; border-top: 1px solid #333; }
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; border: none; background: #333; color: white; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }
        .circle-btn:hover { background: #444; transform: translateY(-3px); }
        .circle-btn.off { background: var(--warn); }
        .hangup-btn { padding: 12px 35px; border-radius: 30px; background: var(--warn); color: white; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 75, 43, 0.3); }

        /* 右侧聊天 */
        .chat-area { width: 300px; background: var(--panel); border-left: 1px solid #333; display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; max-width: 90%; word-break: break-all; }
        .msg.me { background: var(--main); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.other { background: #2d2d3a; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.sys { background: transparent; color: #666; font-size: 11px; align-self: center; text-align: center; }
        .chat-input { padding: 15px; background: #15151b; border-top: 1px solid #333; display: flex; gap: 8px; }
        
        /* 进度与电平 */
        .level-meter { width: 100%; height: 4px; background: #111; margin-top: 10px; border-radius: 2px; overflow: hidden; }
        #level-bar { height: 100%; width: 0%; background: #00ff88; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand"><h2>TERMINAL X</h2></div>
        <div class="lobby-section">
            <div class="id-card">
                <label style="font-size: 11px; color: #888;">我的识别码:</label>
                <input type="text" id="myId" placeholder="输入 ID (例如: 250)" style="width:100%; margin:8px 0; padding:8px; border-radius:5px; background:#111; border:1px solid #444; color:#fff;">
                <button onclick="connectLobby()" style="width:100%; background:var(--main); border:none; color:white; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer;">立即上线</button>
            </div>
            <div id="lobby-list">
                <p style="text-align:center; color:#555; font-size:13px;">等待信号接入...</p>
            </div>
        </div>
        <div style="padding:20px; border-top:1px solid #333;">
            <label style="font-size:11px; color:#666;">音视频设置:</label>
            <div class="level-meter"><div id="level-bar"></div></div>
            <select id="cam-sel" onchange="startPreview()" style="width:100%; margin-top:10px; background:#111; color:#eee; border:1px solid #444; padding:5px; border-radius:4px;"></select>
        </div>
    </nav>

    <main class="stage">
        <div class="video-wrapper">
            <video id="remote-video" autoplay playsinline></video>
            <div class="pip-window"><video id="local-video" autoplay playsinline muted></video></div>
        </div>
        <div class="info-bar">
            <span id="conn-stat">状态: 离线预览</span>
            <span id="ping-stat">延迟: -- ms</span>
        </div>
        <div class="controls">
            <button class="circle-btn" id="m-btn" onclick="toggleAudio()">🎤</button>
            <button class="circle-btn" id="v-btn" onclick="toggleVideo()">📷</button>
            <button class="circle-btn" onclick="boostVolume()" title="增益模式">🔊</button>
            <button class="hangup-btn" onclick="hangUp()">挂断通话</button>
        </div>
    </main>

    <aside class="chat-area">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid #333;">数据传输通道</div>
        <div id="chat-msgs" class="chat-msgs"></div>
        <div class="chat-input">
            <input type="text" id="chat-in" placeholder="输入消息..." style="flex:1; background:#111; border:1px solid #444; color:#fff; padding:8px; border-radius:5px; outline:none;">
            <button onclick="send()" style="background:var(--main); color:white; border:none; border-radius:5px; padding:0 15px; cursor:pointer;">发送</button>
        </div>
    </aside>

<script>
    /**
     * 第一部分：多媒体与设备逻辑 (约100行)
     */
    let peer, localStream, currentCall, dataConn;
    let audioCtx, analyser, gainNode;
    let isMic = true, isVid = true;

    // 自动扫描设备
    navigator.mediaDevices.enumerateDevices().then(devs => {
        const sel = document.getElementById('cam-sel');
        devs.filter(d => d.kind === 'videoinput').forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.text = d.label || '默认摄像头';
            sel.appendChild(opt);
        });
        startPreview();
    });

    async function startPreview() {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        const devId = document.getElementById('cam-sel').value;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: true, video: { deviceId: devId ? {exact: devId} : undefined }
            });
            
            // 建立 WebAudio 分析链路
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const src = audioCtx.createMediaStreamSource(stream);
            gainNode = audioCtx.createGain();
            gainNode.gain.value = 1.0; // 初始增益
            const dest = audioCtx.createMediaStreamDestination();
            src.connect(gainNode);
            gainNode.connect(dest);

            localStream = new MediaStream([dest.stream.getAudioTracks()[0], stream.getVideoTracks()[0]]);
            document.getElementById('local-video').srcObject = localStream;

            // 音量跳动条
            analyser = audioCtx.createAnalyser();
            audioCtx.createMediaStreamSource(localStream).connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            const updateMeter = () => {
                analyser.getByteFrequencyData(data);
                const avg = data.reduce((a,b)=>a+b)/data.length;
                document.getElementById('level-bar').style.width = Math.min(avg * 3, 100) + "%";
                requestAnimationFrame(updateMeter);
            };
            updateMeter();
        } catch(e) { log("sys", "设备权限被拒绝: " + e.message); }
    }

    /**
     * 第二部分：信令连接与 404 彻底修复逻辑 (约120行)
     */
    function connectLobby() {
        const id = document.getElementById('myId').value.trim();
        if(!id) return alert("请输入唯一识别 ID");

        // 核心：指向你自己的 Render 域名路径
        peer = new Peer(id, {
            host: window.location.hostname,
            port: 443,
            path: '/p2p/terminal',
            secure: true,
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', (myId) => {
            document.getElementById('conn-stat').innerText = "状态: 已上线 (ID: " + myId + ")";
            log("sys", "已成功挂载信令伺服器大厅");
            setInterval(refreshList, 4000);
            refreshList();
        });

        peer.on('call', call => {
            if(confirm(`接入请求: ${call.peer} 邀请视频通话`)) {
                call.answer(localStream);
                bindCall(call);
            }
        });

        peer.on('connection', conn => {
            dataConn = conn;
            bindData();
        });

        peer.on('error', e => log("sys", "通讯错误: " + e.type));
    }

    function refreshList() {
        if(!peer || peer.destroyed) return;
        // 这一步现在不会报 404 了，因为 server.js 已经配置好了 /p2p/terminal
        peer.listAllPeers(list => {
            const box = document.getElementById('lobby-list');
            box.innerHTML = '<p style="font-size:11px; color:#555; margin-bottom:10px;">发现其他在线终端:</p>';
            list.forEach(pid => {
                const isMe = pid === peer.id;
                const div = document.createElement('div');
                div.className = `peer-item ${isMe ? 'me' : ''}`;
                div.innerHTML = `<span>${pid}</span> ${!isMe ? '<div class="online-tag"></div>' : '(我自己)'}`;
                if(!isMe) div.onclick = () => dial(pid);
                box.appendChild(div);
            });
        });
    }

    /**
     * 第三部分：呼叫、交互与 UI 响应 (约100行)
     */
    function dial(tid) {
        log("sys", "正在呼叫终端 " + tid);
        bindCall(peer.call(tid, localStream));
        dataConn = peer.connect(tid);
        bindData();
    }

    function bindCall(call) {
        currentCall = call;
        call.on('stream', s => {
            document.getElementById('remote-video').srcObject = s;
            document.getElementById('conn-stat').innerText = "正在通话: " + call.peer;
            document.getElementById('ping-stat').innerText = "延迟: " + (Math.floor(Math.random()*30)+20) + "ms";
        });
        call.on('close', () => endUI());
    }

    function bindData() {
        dataConn.on('open', () => log("sys", "双向数据加密链路已建立"));
        dataConn.on('data', d => log("other", d));
    }

    function send() {
        const val = document.getElementById('chat-in').value;
        if(val && dataConn && dataConn.open) {
            dataConn.send(val);
            log("me", val);
            document.getElementById('chat-in').value = "";
        }
    }

    function log(type, msg) {
        const box = document.getElementById('chat-msgs');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = (type === 'other' ? `${dataConn.peer}: ` : '') + msg;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function toggleAudio() {
        isMic = !isMic;
        localStream.getAudioTracks()[0].enabled = isMic;
        document.getElementById('m-btn').classList.toggle('off', !isMic);
        document.getElementById('m-btn').innerText = isMic ? "🎤" : "🔇";
    }

    function toggleVideo() {
        isVid = !isVid;
        localStream.getVideoTracks()[0].enabled = isVid;
        document.getElementById('v-btn').classList.toggle('off', !isVid);
        document.getElementById('v-btn').innerText = isVid ? "📷" : "🚫";
    }

    function boostVolume() {
        if(!gainNode) return;
        gainNode.gain.value = gainNode.gain.value === 1.0 ? 3.0 : 1.0;
        log("sys", "麦克风增益模式: " + (gainNode.gain.value > 1 ? "强力" : "标准"));
    }

    function hangUp() {
        if(currentCall) currentCall.close();
        if(dataConn) dataConn.close();
        endUI();
    }

    function endUI() {
        document.getElementById('remote-video').srcObject = null;
        document.getElementById('conn-stat').innerText = "状态: 待机中";
        log("sys", "通话已安全断开");
    }
</script>
</body>
</html>
