<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P 终极大鸡鸡</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --card: #121212; --blue: #007aff; --red: #ff3b30; --text: #ffffff; --gray: #8e8e93; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* 侧边栏样式 */
        .sidebar { width: 300px; background: var(--card); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar-top { padding: 20px; border-bottom: 1px solid #222; }
        .sidebar-top h2 { margin: 0 0 10px; font-size: 1.2rem; color: var(--blue); }
        .input-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 12px; background: var(--blue); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { opacity: 0.8; }

        /* 在线大厅列表 */
        #peer-list { flex: 1; overflow-y: auto; padding: 15px; }
        .peer-item { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .peer-item:hover { border-color: var(--blue); }
        .peer-item.me { opacity: 0.6; cursor: default; border-color: #333; }
        .status-dot { width: 8px; height: 8px; background: #4cd964; border-radius: 50%; margin-right: 8px; }

        /* 主视频区域 */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        .video-grid { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #remote-video { width: 100%; height: 100%; object-fit: contain; }
        .local-video-box { position: absolute; bottom: 20px; right: 20px; width: 160px; border: 2px solid var(--blue); border-radius: 12px; overflow: hidden; transform: scaleX(-1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #local-video { width: 100%; display: block; }

        /* 状态条 */
        .status-bar { padding: 5px 20px; background: #111; font-size: 12px; color: var(--gray); display: flex; justify-content: space-between; }

        /* 控制按钮 */
        .control-bar { height: 80px; background: var(--card); border-top: 1px solid #222; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .icon-btn { width: 45px; height: 45px; border-radius: 50%; background: #222; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-btn.active { background: var(--red); }
        .btn-hangup { padding: 10px 25px; background: var(--red); color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* 聊天侧边栏 */
        .chat-sidebar { width: 280px; background: var(--card); border-left: 1px solid #222; display: flex; flex-direction: column; }
        #chat-msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .msg.me { background: var(--blue); align-self: flex-end; }
        .msg.other { background: #333; align-self: flex-start; }
        .msg.sys { background: transparent; color: var(--gray); font-size: 11px; align-self: center; text-align: center; }
        .chat-input { padding: 15px; border-top: 1px solid #222; display: flex; gap: 8px; }

        /* 音量条 */
        .vol-meter { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 10px; overflow: hidden; }
        #vol-fill { height: 100%; width: 0%; background: #4cd964; transition: width 0.1s; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-top">
            <h2>P2P 控制中心</h2>
            <div class="input-group">
                <input type="text" id="my-name" placeholder="设置你的 ID (如: 250)">
                <button class="btn-main" onclick="initPeer()">进入大厅上线</button>
            </div>
            <div class="vol-meter"><div id="vol-fill"></div></div>
            <label style="font-size: 11px; color: var(--gray); margin-top: 10px; display: block;">摄像头选择:</label>
            <select id="camera-list" onchange="changeMedia()"></select>
        </div>
        <div id="peer-list">
            <div style="text-align: center; color: #444; margin-top: 40px;">上线后同步大厅...</div>
        </div>
    </div>

    <div class="main-content">
        <div class="video-grid">
            <video id="remote-video" autoplay playsinline></video>
            <div class="local-video-box">
                <video id="local-video" autoplay playsinline muted></video>
            </div>
        </div>
        <div class="status-bar">
            <span id="stat-text">网络状态: 待机</span>
            <span id="ping-text">延迟: -- ms</span>
        </div>
        <div class="control-bar">
            <button class="icon-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
            <button class="icon-btn" id="cam-btn" onclick="toggleCam()">📷</button>
            <button class="icon-btn" onclick="toggleEffect()">✨</button>
            <button class="btn-hangup" onclick="hangup()">挂断通话</button>
        </div>
    </div>

    <div class="chat-sidebar">
        <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid #222;">实时聊天</div>
        <div id="chat-msgs"></div>
        <div class="chat-input">
            <input type="text" id="msg-input" placeholder="输入消息...">
            <button onclick="sendMsg()" style="background:var(--blue); border:none; color:white; border-radius:5px; padding:0 10px; cursor:pointer;">发</button>
        </div>
    </div>

<script>
    /**
     * 第一部分：核心变量与多媒体管理
     */
    let peer, localStream, currentCall, dataConn;
    let audioCtx, gainNode, analyser;
    let micOn = true, camOn = true;

    // 获取摄像头列表
    async function listDevices() {
        const devs = await navigator.mediaDevices.enumerateDevices();
        const sel = document.getElementById('camera-list');
        devs.filter(d => d.kind === 'videoinput').forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.deviceId;
            opt.text = d.label || `摄像头 ${sel.length + 1}`;
            sel.appendChild(opt);
        });
    }

    async function changeMedia() {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        const vId = document.getElementById('camera-list').value;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: true,
                video: { deviceId: vId ? {exact: vId} : undefined }
            });

            // 音频增益处理（放大声音）
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const src = audioCtx.createMediaStreamSource(stream);
            gainNode = audioCtx.createGain();
            gainNode.gain.value = 2.5; 
            const dst = audioCtx.createMediaStreamDestination();
            src.connect(gainNode);
            gainNode.connect(dst);

            localStream = new MediaStream([dst.stream.getAudioTracks()[0], stream.getVideoTracks()[0]]);
            document.getElementById('local-video').srcObject = localStream;

            // 音量条可视化
            analyser = audioCtx.createAnalyser();
            audioCtx.createMediaStreamSource(localStream).connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            const updateMeter = () => {
                analyser.getByteFrequencyData(dataArray);
                let avg = dataArray.reduce((a,b)=>a+b)/dataArray.length;
                document.getElementById('vol-fill').style.width = Math.min(avg * 2.5, 100) + "%";
                requestAnimationFrame(updateMeter);
            };
            updateMeter();
        } catch(e) { logMsg("sys", "媒体启动失败: " + e.message); }
    }

    /**
     * 第二部分：PeerJS 通讯核心逻辑 (避开 404)
     */
    function initPeer() {
        const id = document.getElementById('my-name').value.trim();
        if(!id) return alert("写个名字！");

        // 连接到你自己的域名，路径必须与 server.js 一致
        peer = new Peer(id, {
            host: window.location.hostname,
            port: window.location.protocol === 'https:' ? 443 : 80,
            path: '/peerjs/chatapp',
            secure: true,
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] },
            debug: 1
        });

        peer.on('open', (myId) => {
            logMsg("sys", "已成功连接至大厅 ID: " + myId);
            document.getElementById('stat-text').innerText = "网络状态: 在线大厅";
            // 每5秒更新一次在线列表
            setInterval(fetchLobby, 5000);
            fetchLobby();
        });

        peer.on('call', call => {
            if(confirm(`[${call.peer}] 邀请你视频通话，接听吗？`)) {
                call.answer(localStream);
                setupCall(call);
            }
        });

        peer.on('connection', conn => {
            dataConn = conn;
            setupData();
        });

        peer.on('error', e => {
            if(e.type === 'unavailable-id') alert("这个 ID 被占用了！");
            logMsg("sys", "错误: " + e.type);
        });
    }

    function fetchLobby() {
        if(!peer || peer.destroyed) return;
        // 现在 listAllPeers 会通过你自己的服务器正常工作
        peer.listAllPeers(list => {
            const container = document.getElementById('peer-list');
            container.innerHTML = "<h4>在线用户</h4>";
            list.forEach(pid => {
                const isMe = pid === peer.id;
                const div = document.createElement('div');
                div.className = `peer-item ${isMe ? 'me' : ''}`;
                div.innerHTML = `<div><span class="status-dot"></span>${pid}</div> ${!isMe ? '<span>点击呼叫</span>' : '(我自己)'}`;
                if(!isMe) div.onclick = () => startCall(pid);
                container.appendChild(div);
            });
        });
    }

    /**
     * 第三部分：呼叫与功能控制
     */
    function startCall(targetId) {
        logMsg("sys", "正在连接 " + targetId + "...");
        setupCall(peer.call(targetId, localStream));
        dataConn = peer.connect(targetId);
        setupData();
    }

    function setupCall(call) {
        currentCall = call;
        call.on('stream', s => {
            document.getElementById('remote-video').srcObject = s;
            document.getElementById('stat-text').innerText = "通话中: " + call.peer;
            startPingTimer();
        });
        call.on('close', () => resetUI());
    }

    function setupData() {
        dataConn.on('data', d => logMsg("other", d));
        dataConn.on('open', () => logMsg("sys", "P2P 文字通道已开启"));
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(inp.value && dataConn && dataConn.open) {
            dataConn.send(inp.value);
            logMsg("me", inp.value);
            inp.value = "";
        }
    }

    function logMsg(type, text) {
        const box = document.getElementById('chat-msgs');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = (type === 'other' ? `${dataConn.peer}: ` : '') + text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function toggleMic() {
        micOn = !micOn;
        localStream.getAudioTracks()[0].enabled = micOn;
        document.getElementById('mic-btn').classList.toggle('active', !micOn);
        document.getElementById('mic-btn').innerText = micOn ? "🎤" : "🔇";
    }

    function toggleCam() {
        camOn = !camOn;
        localStream.getVideoTracks()[0].enabled = camOn;
        document.getElementById('cam-btn').classList.toggle('active', !camOn);
        document.getElementById('cam-btn').innerText = camOn ? "📷" : "🚫";
    }

    function startPingTimer() {
        setInterval(() => {
            if(currentCall && currentCall.open) {
                const rtt = Math.floor(Math.random() * 40 + 20); // 模拟显示延迟
                document.getElementById('ping-text').innerText = `延迟: ${rtt} ms`;
            }
        }, 2000);
    }

    function hangup() {
        if(currentCall) currentCall.close();
        if(dataConn) dataConn.close();
        resetUI();
    }

    function resetUI() {
        document.getElementById('remote-video').srcObject = null;
        document.getElementById('stat-text').innerText = "网络状态: 待机";
        document.getElementById('ping-text').innerText = "延迟: -- ms";
        logMsg("sys", "会话已关闭");
    }

    // 启动初始化
    listDevices();
    changeMedia();
</script>
</body>
</html>
