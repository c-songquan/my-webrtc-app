<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC 调试工具 - 专业版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        video { width: 100%; background: #000; border-radius: 10px; margin: 10px 0; }
        #local-video { width: 120px; position: absolute; right: 30px; border: 2px solid #007bff; }
        .control-group { background: #2a2a2a; padding: 10px; border-radius: 8px; margin: 10px 0; text-align: left; }
        .slider-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .status-bar { padding: 5px 10px; border-radius: 20px; font-size: 12px; border: 1px solid #444; display: inline-block; margin-bottom: 10px; }
        .p2p { color: #00ff00; border-color: #00ff00; }
        button { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-switch { background: #444; color: white; }
        .active { background: #28a745 !important; }
    </style>
</head>
<body>

<div class="card">
    <h3>WebRTC 实时调音台</h3>
    <div id="conn-status" class="status-bar">未连接</div>
    
    <div style="position: relative;">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
    </div>

    <div class="control-group">
        <div class="slider-label">
            <span>降噪模式 (Noise Suppression)</span>
            <button id="noise-btn" class="btn-switch" onclick="toggleNoiseSuppression()">已关闭 (原始音)</button>
        </div>
    </div>

    <div class="control-group">
        <div class="slider-label"><span>我的麦克风增益 (发送)</span><span id="local-vol-txt">1.0x</span></div>
        <input type="range" id="local-gain" min="0" max="5" step="0.1" value="1.0" oninput="updateLocalGain(this.value)">
    </div>

    <div class="control-group">
        <div class="slider-label"><span>对方声音音量 (接收)</span><span id="remote-vol-txt">1.0x</span></div>
        <input type="range" id="remote-gain" min="0" max="5" step="0.1" value="1.0" oninput="updateRemoteGain(this.value)">
    </div>

    <div style="margin-top: 20px;">
        <input type="text" id="myId" placeholder="设我的ID" style="padding: 10px; border-radius: 5px; width: 80px;">
        <button class="btn-primary" onclick="initPeer()">启动</button>
        <input type="text" id="destId" placeholder="对方ID快速拨打" style="padding: 10px; border-radius: 5px; width: 80px;">
        <button class="btn-primary" onclick="makeCall()">拨打</button>
    </div>
</div>

<script>
    let peer, localStream, remoteAudioCtx, remoteGainNode, localGainNode;
    let isNoiseSuppressed = false;

    // 更新本地发送音量
    function updateLocalGain(val) {
        if (localGainNode) localGainNode.gain.value = val;
        document.getElementById('local-vol-txt').innerText = val + "x";
    }

    // 更新对方接收音量
    function updateRemoteGain(val) {
        if (remoteGainNode) remoteGainNode.gain.value = val;
        document.getElementById('remote-vol-txt').innerText = val + "x";
    }

    // 切换降噪模式 (需要重新获取媒体流)
    async function toggleNoiseSuppression() {
        isNoiseSuppressed = !isNoiseSuppressed;
        const btn = document.getElementById('noise-btn');
        btn.innerText = isNoiseSuppressed ? "已开启 (过滤杂音)" : "已关闭 (原始音)";
        btn.classList.toggle('active', isNoiseSuppressed);
        
        // 重新获取流并更新当前通话
        await getMedia(true);
        if (peer && peer.connections) {
            alert("降噪设置已更改，请重新拨打以应用效果。");
        }
    }

    async function getMedia(refresh = false) {
        if (localStream && !refresh) return localStream;
        
        // 如果是刷新流，先停止旧音轨
        if (localStream) localStream.getTracks().forEach(t => t.stop());

        const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation: isNoiseSuppressed,
                noiseSuppression: isNoiseSuppressed,
                autoGainControl: isNoiseSuppressed
            },
            video: { width: 640, height: 480 }
        });

        // 建立本地音量控制 (Gain Node)
        const ctx = new AudioContext();
        const source = ctx.createMediaStreamSource(stream);
        localGainNode = ctx.createGain();
        localGainNode.gain.value = document.getElementById('local-gain').value;
        const dest = ctx.createMediaStreamDestination();
        source.connect(localGainNode);
        localGainNode.connect(dest);

        localStream = new MediaStream([dest.stream.getAudioTracks()[0], stream.getVideoTracks()[0]]);
        document.getElementById('local-video').srcObject = localStream;
        return localStream;
    }

    function initPeer() {
        peer = new Peer(document.getElementById('myId').value);
        peer.on('call', async (call) => {
            const stream = await getMedia();
            call.answer(stream);
            setupRemoteVideo(call);
        });
        document.getElementById('conn-status').innerText = "等待呼叫...";
    }

    async function makeCall() {
        const stream = await getMedia();
        const call = peer.call(document.getElementById('destId').value, stream);
        setupRemoteVideo(call);
    }

    function setupRemoteVideo(call) {
        call.on('stream', (rStream) => {
            const remoteVideo = document.getElementById('remote-video');
            
            // 关键：处理对方的声音放大
            if (!remoteAudioCtx) {
                remoteAudioCtx = new AudioContext();
                const source = remoteAudioCtx.createMediaStreamSource(rStream);
                remoteGainNode = remoteAudioCtx.createGain();
                remoteGainNode.gain.value = document.getElementById('remote-gain').value;
                
                // 将处理后的声音输出到默认扬声器
                remoteGainNode.connect(remoteAudioCtx.destination);
                
                // 视频标签静音，防止声音重复播放
                remoteVideo.srcObject = rStream;
                remoteVideo.muted = true; 
            }
            document.getElementById('conn-status').innerText = "✅ 通话中";
        });
    }
</script>
</body>
</html>
