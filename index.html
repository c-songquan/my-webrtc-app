<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P 终极控制台 v2.1 - 三折叠音量增强版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --main: #00d2ff; --warn: #ff4b2b; --bg: #0f0f12; --panel: #1a1a20; --text: #e0e0e0; }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* 三折叠布局核心 */
        .sidebar { width: 300px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 100; position: relative; flex-shrink: 0; }
        .chat-area { width: 300px; background: var(--panel); border-left: 1px solid #333; display: flex; flex-direction: column; position: relative; flex-shrink: 0; }
        
        /* 折叠状态 */
        .sidebar.collapsed { width: 0; border: none; }
        .chat-area.collapsed { width: 0; border: none; }
        .sidebar.collapsed *, .chat-area.collapsed * { visibility: hidden; opacity: 0; }

        /* 折叠按钮（蓝色箭头） */
        .fold-btn {
            position: absolute; top: 50%; transform: translateY(-50%); width: 20px; height: 60px;
            background: var(--main); color: #000; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 110; font-weight: bold; border-radius: 4px;
        }
        .left-fold { right: -20px; border-radius: 0 4px 4px 0; }
        .right-fold { left: -20px; border-radius: 4px 0 0 4px; }

        /* 中间视频区自适应 */
        .stage { flex: 1; display: flex; flex-direction: column; position: relative; background: #050505; min-width: 0; }
        
        /* 原始样式保留 */
        .sidebar-brand { padding: 30px 20px; background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: white; }
        .lobby-section { flex: 1; overflow-y: auto; padding: 20px; }
        .id-card { background: #252530; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--main); }
        .peer-item { background: #2a2a35; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        
        .video-wrapper { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        #remote-video { width: 100%; height: 100%; object-fit: contain; }
        .pip-window { position: absolute; bottom: 20px; right: 20px; width: 180px; aspect-ratio: 16/9; border: 2px solid var(--main); border-radius: 12px; overflow: hidden; transform: scaleX(-1); background: #000; }
        #local-video { width: 100%; height: 100%; object-fit: cover; }

        /* 底部控制栏与音量滑块 */
        .controls { height: 100px; background: var(--panel); display: flex; align-items: center; justify-content: center; gap: 15px; border-top: 1px solid #333; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #333; color: white; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .circle-btn.off { background: var(--warn); }
        
        /* 弹出音量面板 */
        .vol-wrapper { display: flex; align-items: center; position: relative; }
        .blue-arrow-small { color: var(--main); font-size: 12px; cursor: pointer; padding: 5px; user-select: none; }
        .vol-popover {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #222; border: 1px solid var(--main); padding: 15px; border-radius: 10px;
            display: none; flex-direction: column; align-items: center; z-index: 200;
        }
        .vol-popover.active { display: flex; }
        .vol-popover input { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 8px; height: 100px; }
        .vol-popover span { font-size: 11px; margin-top: 5px; color: var(--main); }

        .chat-msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; }
        .msg.me { background: var(--main); align-self: flex-end; }
        .msg.other { background: #2d2d3a; align-self: flex-start; }
        
        .level-meter { width: 100%; height: 4px; background: #111; margin-top: 10px; border-radius: 2px; overflow: hidden; }
        #level-bar { height: 100%; width: 0%; background: #00ff88; }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="fold-btn left-fold" onclick="toggleFold('sidebar')">◀</div>
        <div class="sidebar-brand"><h2>TERMINAL X</h2></div>
        <div class="lobby-section">
            <div class="id-card">
                <input type="text" id="myId" placeholder="识别码" style="width:100%; padding:8px; background:#111; border:1px solid #444; color:#fff;">
                <button onclick="connectLobby()" style="width:100%; margin-top:8px; background:var(--main); border:none; color:white; padding:10px; border-radius:5px; cursor:pointer;">立即上线</button>
            </div>
            <div id="lobby-list"></div>
        </div>
        <div style="padding:20px; border-top:1px solid #333;">
            <div class="level-meter"><div id="level-bar"></div></div>
            <select id="cam-sel" onchange="startPreview()" style="width:100%; margin-top:10px; background:#111; color:#eee; border:1px solid #444; padding:5px;"></select>
        </div>
    </nav>

    <main class="stage">
        <div class="video-wrapper">
            <video id="remote-video" autoplay playsinline></video>
            <div class="pip-window"><video id="local-video" autoplay playsinline muted></video></div>
        </div>
        <div class="info-bar" style="height:30px; background:#111; display:flex; justify-content:space-between; padding:0 15px; font-size:11px; color:#555; align-items:center;">
            <span id="conn-stat">状态: 离线预览</span>
            <span id="vol-display">MIC: 100% | SPK: 100%</span>
        </div>

        <div class="controls">
            <div class="vol-wrapper">
                <button class="circle-btn" id="m-btn" onclick="toggleAudio()">🎤</button>
                <div class="blue-arrow-small" onclick="toggleVPop('mic-pop')">▲</div>
                <div id="mic-pop" class="vol-popover">
                    <input type="range" min="0" max="2" step="0.01" value="1" oninput="adjMic(this.value)">
                    <span id="mic-val">MIC: 100%</span>
                </div>
            </div>

            <button class="circle-btn" id="v-btn" onclick="toggleVideo()">📷</button>

            <div class="vol-wrapper">
                <button class="circle-btn" id="s-btn" onclick="boostVolume()">🔊</button>
                <div class="blue-arrow-small" onclick="toggleVPop('spk-pop')">▲</div>
                <div id="spk-pop" class="vol-popover">
                    <input type="range" min="0" max="2" step="0.01" value="1" oninput="adjSpk(this.value)">
                    <span id="spk-val">SPK: 100%</span>
                </div>
            </div>

            <button class="hangup-btn" onclick="hangUp()">挂断通话</button>
        </div>
    </main>

    <aside class="chat-area" id="chat-area">
        <div class="fold-btn right-fold" onclick="toggleFold('chat-area')">▶</div>
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid #333;">数据传输通道</div>
        <div id="chat-msgs" class="chat-msgs"></div>
        <div class="chat-input">
            <input type="text" id="chat-in" placeholder="输入..." style="flex:1; background:#111; border:1px solid #444; color:#fff; padding:8px;">
            <button onclick="send()" style="background:var(--main); border:none; color:white; padding:0 10px; cursor:pointer;">发送</button>
        </div>
    </aside>

<script>
    let peer, localStream, currentCall, dataConn;
    let audioCtx, analyser, gainNode; // 麦克风增益Node
    let isMic = true, isVid = true;

    // 三折叠逻辑
    function toggleFold(id) {
        const el = document.getElementById(id);
        const btn = el.querySelector('.fold-btn');
        el.classList.toggle('collapsed');
        if(id === 'sidebar') btn.innerText = el.classList.contains('collapsed') ? '▶' : '◀';
        else btn.innerText = el.classList.contains('collapsed') ? '◀' : '▶';
    }

    // 音量弹窗控制
    function toggleVPop(id) {
        document.querySelectorAll('.vol-popover').forEach(p => p.id !== id && p.classList.remove('active'));
        document.getElementById(id).classList.toggle('active');
    }

    // 麦克风增益 (0-200%)
    function adjMic(v) {
        if(gainNode) gainNode.gain.value = v;
        document.getElementById('mic-val').innerText = `MIC: ${Math.round(v*100)}%`;
        updateStatusDisplay();
    }

    // 接收音量 (0-200%)
    function adjSpk(v) {
        const rv = document.getElementById('remote-video');
        if(v > 1) rv.volume = 1; else rv.volume = v; // HTML5 Video最高为1，超过部分需WebAudio(此处简化处理)
        document.getElementById('spk-val').innerText = `SPK: ${Math.round(v*100)}%`;
        updateStatusDisplay();
    }

    function updateStatusDisplay() {
        const mv = document.getElementById('mic-val').innerText;
        const sv = document.getElementById('spk-val').innerText;
        document.getElementById('vol-display').innerText = `${mv} | ${sv}`;
    }

    // --- 以下完整保留你原始的所有核心逻辑 ---
    navigator.mediaDevices.enumerateDevices().then(devs => {
        const sel = document.getElementById('cam-sel');
        devs.filter(d => d.kind === 'videoinput').forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.deviceId; opt.text = d.label || '默认摄像头'; sel.appendChild(opt);
        });
        startPreview();
    });

    async function startPreview() {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        const devId = document.getElementById('cam-sel').value;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: true, video: { deviceId: devId ? {exact: devId} : undefined }
            });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const src = audioCtx.createMediaStreamSource(stream);
            gainNode = audioCtx.createGain();
            const dest = audioCtx.createMediaStreamDestination();
            src.connect(gainNode); gainNode.connect(dest);

            localStream = new MediaStream([dest.stream.getAudioTracks()[0], stream.getVideoTracks()[0]]);
            document.getElementById('local-video').srcObject = localStream;

            analyser = audioCtx.createAnalyser();
            audioCtx.createMediaStreamSource(localStream).connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            const updateMeter = () => {
                analyser.getByteFrequencyData(data);
                const avg = data.reduce((a,b)=>a+b)/data.length;
                document.getElementById('level-bar').style.width = Math.min(avg * 3, 100) + "%";
                requestAnimationFrame(updateMeter);
            };
            updateMeter();
        } catch(e) { log("sys", "设备错误: " + e.message); }
    }

    function connectLobby() {
        const id = document.getElementById('myId').value.trim();
        if(!id) return alert("输入 ID");
        peer = new Peer(id, {
            host: window.location.hostname, port: 443, path: '/p2p/terminal', secure: true,
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
        });
        peer.on('open', (id) => {
            document.getElementById('conn-stat').innerText = "已上线: " + id;
            setInterval(refreshList, 4000); refreshList();
        });
        peer.on('call', call => { if(confirm(`接入通话: ${call.peer}?`)) { call.answer(localStream); bindCall(call); } });
        peer.on('connection', conn => { dataConn = conn; bindData(); });
    }

    function refreshList() {
        if(!peer || peer.destroyed) return;
        peer.listAllPeers(list => {
            const box = document.getElementById('lobby-list');
            box.innerHTML = '';
            list.forEach(pid => {
                const isMe = pid === peer.id;
                const div = document.createElement('div');
                div.className = `peer-item`;
                div.innerHTML = `<span>${pid}</span> ${isMe ? '(我)' : '<div style="width:8px;height:8px;background:#0f8;border-radius:50%"></div>'}`;
                if(!isMe) div.onclick = () => dial(pid);
                box.appendChild(div);
            });
        });
    }

    function dial(tid) { bindCall(peer.call(tid, localStream)); dataConn = peer.connect(tid); bindData(); }
    function bindCall(call) {
        currentCall = call;
        call.on('stream', s => document.getElementById('remote-video').srcObject = s);
        call.on('close', () => endUI());
    }
    function bindData() { dataConn.on('data', d => log("other", d)); }
    function send() {
        const v = document.getElementById('chat-in').value;
        if(v && dataConn?.open) { dataConn.send(v); log("me", v); document.getElementById('chat-in').value = ""; }
    }
    function log(type, m) {
        const div = document.createElement('div'); div.className = `msg ${type}`; div.innerText = m;
        const b = document.getElementById('chat-msgs'); b.appendChild(div); b.scrollTop = b.scrollHeight;
    }
    function toggleAudio() { isMic = !isMic; localStream.getAudioTracks()[0].enabled = isMic; document.getElementById('m-btn').classList.toggle('off', !isMic); }
    function toggleVideo() { isVid = !isVid; localStream.getVideoTracks()[0].enabled = isVid; document.getElementById('v-btn').classList.toggle('off', !isVid); }
    function boostVolume() { adjMic(gainNode.gain.value > 1 ? 1 : 2); }
    function hangUp() { currentCall?.close(); dataConn?.close(); endUI(); }
    function endUI() { document.getElementById('remote-video').srcObject = null; document.getElementById('conn-stat').innerText = "状态: 待机"; }
</script>
</body>
</html>
